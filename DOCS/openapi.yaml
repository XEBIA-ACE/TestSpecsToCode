openapi: 3.0.3
info:
  title: User Management Service
  description: >
    Registration (F-01), OTP Delivery via email (F-02), Login/Session/Password
    Recovery (F-03), and Account Deletion (F-04). No Swagger UI was present in
    the repo — this spec was generated by inspecting src/controllers, src/routes,
    and src/errors directly (see docs/API_REFERENCE.md for narrative detail).
  version: "1.0.0"
servers:
  - url: http://localhost:3000
    description: Local development
security: []
tags:
  - name: Registration
  - name: OTP
  - name: Auth
  - name: Deletion
  - name: Admin
  - name: Health

paths:
  /health:
    get:
      tags: [Health]
      summary: Liveness/readiness probe. Always returns 200.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  db_reachable: { type: boolean }

  /api/v1/users/register:
    post:
      tags: [Registration]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, emailAddress, password, passwordConfirmation]
              properties:
                username: { type: string }
                emailAddress: { type: string, format: email }
                password: { type: string }
                passwordConfirmation: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId: { type: string, format: uuid }
                  message: { type: string }
        "422": { description: Validation error (mandatory fields / email format / password policy) }
        "409": { description: Username already taken }
        "500": { description: Unexpected error }

  /api/v1/users/activate:
    post:
      tags: [Registration]
      summary: Activate an account with an emailed token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string, maxLength: 512 }
      responses:
        "200": { description: Activated }
        "400": { description: Missing/invalid token }
        "404": { description: TOKEN_NOT_FOUND }
        "409": { description: ACCOUNT_NOT_PENDING }
        "410": { description: TOKEN_EXPIRED or TOKEN_CONSUMED }
        "500": { description: Unexpected error }

  /api/v1/admin/users/{user_id}/resend-confirmation:
    post:
      tags: [Admin]
      summary: Admin resend of the activation email
      security: [{ AdminBearer: [] }]
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "202": { description: Enqueued }
        "400": { description: Missing user_id }
        "401": { description: Missing/malformed Authorization header }
        "403": { description: Wrong admin token }
        "404": { description: User not found }
        "409": { description: Account is not pending activation }
        "500": { description: Unexpected error }

  /api/v1/otp/send:
    post:
      tags: [OTP]
      summary: Send a one-time code via email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId: { type: string, format: uuid }
      responses:
        "202":
          description: Accepted (regardless of email delivery outcome; OTP is never returned in the body)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [accepted, dispatch_failed] }
        "400": { description: Missing userId }
        "403": { description: OTP_FORBIDDEN — user not found or not active }
        "429": { description: OTP_RATE_LIMIT_EXCEEDED }
        "500": { description: Unexpected error }
  /api/v1/otp/resend:
    post:
      tags: [OTP]
      summary: Resend a one-time code via email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId: { type: string, format: uuid }
      responses:
        "202":
          description: Accepted (regardless of email delivery outcome; OTP is never returned in the body)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [accepted, dispatch_failed] }
        "400": { description: Missing userId }
        "403": { description: OTP_FORBIDDEN — user not found or not active }
        "429": { description: OTP_RATE_LIMIT_EXCEEDED }
        "500": { description: Unexpected error }

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Log in with email/password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  expires_at: { type: string, format: date-time }
        "400": { description: Missing email/password }
        "401": { description: AUTH_INVALID_CREDENTIALS }
        "403": { description: AUTH_ACCOUNT_NOT_ACTIVE }
        "423": { description: AUTH_ACCOUNT_LOCKED (includes retry_after) }
        "500": { description: SESSION_CREATION_FAILED }

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Invalidate the current session (idempotent)
      security: [{ SessionBearer: [] }]
      responses:
        "200": { description: Logged out (always, if header present) }
        "401": { description: Missing/malformed Authorization header }

  /api/v1/auth/password-recovery:
    post:
      tags: [Auth]
      summary: Request a password-recovery email (anti-enumeration — always 202)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "202": { description: Always returned, regardless of whether the email exists }
        "400": { description: Missing email }

  /api/v1/auth/password-reset:
    post:
      tags: [Auth]
      summary: Reset password using a recovery token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recovery_token, new_password]
              properties:
                recovery_token: { type: string }
                new_password: { type: string }
      responses:
        "200": { description: Password reset; all sessions invalidated }
        "400": { description: Missing fields }
        "404": { description: TOKEN_NOT_FOUND }
        "410": { description: TOKEN_EXPIRED }
        "422": { description: PASSWORD_POLICY_VIOLATION }
        "500": { description: Unexpected error }

  /api/v1/users/deletion-requests:
    post:
      tags: [Deletion]
      summary: Request self-service account deletion
      security: [{ SessionBearer: [] }]
      responses:
        "202": { description: Confirmation email queued }
        "401": { description: Session-middleware rejection }
        "403": { description: AUTH_ACCOUNT_NOT_ACTIVE }
        "409": { description: DELETION_REQUEST_ALREADY_PENDING }
        "500": { description: Unexpected error }
    delete:
      tags: [Deletion]
      summary: Cancel the caller's pending deletion request
      security: [{ SessionBearer: [] }]
      responses:
        "200": { description: Cancelled }
        "401": { description: Session-middleware rejection }
        "404": { description: DELETION_REQUEST_NOT_FOUND }
        "500": { description: Unexpected error }

  /api/v1/users/deletion-requests/confirm:
    post:
      tags: [Deletion]
      summary: Confirm account deletion via emailed token (unauthenticated)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId: { type: string, format: uuid }
                  deletedAt: { type: string, format: date-time }
        "400": { description: Missing token }
        "404": { description: TOKEN_NOT_FOUND }
        "410": { description: TOKEN_EXPIRED or TOKEN_CONSUMED }
        "500": { description: Unexpected error }

components:
  securitySchemes:
    SessionBearer:
      type: http
      scheme: bearer
      description: Token returned by POST /api/v1/auth/login
    AdminBearer:
      type: http
      scheme: bearer
      description: Static ADMIN_BEARER_TOKEN configured via env var
