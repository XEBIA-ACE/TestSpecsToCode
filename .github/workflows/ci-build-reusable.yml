name: CI Build (Reusable)
'on':
  workflow_call:
    inputs:
      services:
        description: "JSON list of services: [{name, build_context, dockerfile, image}] \u2014 `image` is the ECR repository\
          \ name"
        required: true
        type: string
      ecr_registry:
        description: Container registry host. Empty = build only, no push.
        required: false
        type: string
        default: ''
      aws_region:
        description: AWS region of the ECR registry
        required: false
        type: string
        default: us-east-1
      build_args:
        description: Additional Docker build arguments
        required: false
        type: string
        default: ''
permissions:
  contents: read
  pull-requests: read
  packages: write
  id-token: write
  security-events: write
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_changes: ${{ steps.matrix.outputs.matrix != '[]' }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ github.head_ref || github.ref }}
    - name: Detect changes
      id: changes
      if: github.event_name == 'pull_request'
      uses: dorny/paths-filter@v3
      with:
        filters: 'app:

          - app/**

          '
    - name: Resolve service matrix
      id: matrix
      env:
        SERVICES: ${{ inputs.services }}
        CHANGED: ${{ steps.changes.outputs.changes || '[]' }}
      run: "if [ \"${{ github.event_name }}\" = \"push\" ]; then\n  echo \"matrix=$(echo \"$SERVICES\" | jq -c .)\" >> \"\
        $GITHUB_OUTPUT\"\nelse\n  FILTERED=$(echo \"$SERVICES\" | jq -c --argjson changed \"$CHANGED\" '[.[] | select(.name\
        \ as $n | $changed | index($n))]')\n  # If no services matched (empty PR or paths-filter miss), use full matrix\n\
        \  if [ \"$FILTERED\" = \"[]\" ] || [ -z \"$FILTERED\" ]; then\n    FILTERED=$(echo \"$SERVICES\" | jq -c .)\n  fi\n\
        \  echo \"matrix=$FILTERED\" >> \"$GITHUB_OUTPUT\"\nfi"
  lint:
    runs-on: ubuntu-latest
    needs:
    - detect-changes
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Lint
      run: npm ci && npm run lint
      working-directory: app
  test:
    runs-on: ubuntu-latest
    needs:
    - lint
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Run tests
      run: npm ci && npm test
      working-directory: app
    services:
      redis:
        image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports:
        - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 3s --health-retries 5
  build:
    runs-on: ubuntu-latest
    needs:
    - test
    - detect-changes
    if: ${{ needs.detect-changes.outputs.has_changes == 'true' }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: image=moby/buildkit:latest
    - name: Build image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: app
        file: app/Dockerfile
        push: false
        load: true
        tags: localhost/app:${{ github.sha }}
        cache-from: type=gha,scope=app
        cache-to: type=gha,mode=max,scope=app
  scan:
    runs-on: ubuntu-latest
    needs:
    - build
    - detect-changes
    if: ${{ needs.detect-changes.outputs.has_changes == 'true' }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build image for scanning
      uses: docker/build-push-action@v5
      with:
        context: app
        file: app/Dockerfile
        push: false
        load: true
        tags: ci-scan-app:${{ github.sha }}
        cache-from: type=gha,scope=app
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: ci-scan-app:${{ github.sha }}
        format: sarif
        output: trivy-results.sarif
        severity: CRITICAL,HIGH
        ignore-unfixed: 'true'
        exit-code: '0'
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: trivy-results.sarif
        category: trivy-app
  push:
    runs-on: ubuntu-latest
    needs:
    - scan
    - detect-changes
    if: ${{ needs.detect-changes.outputs.has_changes == 'true' && inputs.ecr_registry != '' && github.event_name == 'push'
      }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Compute image tag
      id: tag
      run: echo "tag=sha-$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"
    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ inputs.aws_region }}
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: app
        file: app/Dockerfile
        push: true
        tags: ${{ inputs.ecr_registry }}/app:${{ steps.tag.outputs.tag }}
        cache-from: type=gha,scope=app
